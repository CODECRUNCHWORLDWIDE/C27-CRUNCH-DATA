# Exercise 03 — dbt mart tests (schema.yml) to complete.
#
# GOAL
#   Gate the `fct_orders` fact and the `daily_revenue` mart with dbt tests
#   covering every dimension from Lecture 1, using the built-in generic tests
#   plus dbt_utils and dbt_expectations. Pick the right severity for each.
#
# PREREQUISITES
#   Your Week 5 dbt project on DuckDB. Add the packages and install them:
#     # packages.yml
#     packages:
#       - package: dbt-labs/dbt_utils
#         version: [">=1.1.0", "<2.0.0"]
#       - package: calogica/dbt_expectations
#         version: [">=0.10.0", "<0.11.0"]
#     $ dbt deps
#
# PLACE THIS FILE AT
#   models/marts/schema.yml
#
# RUN
#   dbt build                       # runs models AND tests; severity:error halts
#   dbt test --select fct_orders    # just this model's tests
#
# WHAT TO COMPLETE
#   Every `# TODO`. When done, `dbt build` should pass on clean data and a
#   deliberately corrupted seed should fail the matching test.
#
# DELIVERABLE
#   A passing `dbt build` on clean data; a note listing which test each
#   corruption tripped and at which severity.

