# Exercise 04 — dbt source freshness (sources.yml) to complete.
#
# GOAL
#   Configure `dbt source freshness` on the raw `orders` and `products` sources
#   so a stale upstream WARNS or ERRORS — the freshness gate at the source
#   boundary (Lecture 3 section 2). The SLAs come from the data contract:
#   orders lands within 2h (warn at 1h); products is a slow dimension.
#
# PLACE THIS FILE AT
#   models/sources.yml
#
# RUN
#   dbt source freshness
#   # PASS / WARN / ERROR per table; exits non-zero on an ERROR so an Airflow
#   # task running this command HALTS the pipeline (Lecture 3 section 2.1).
#
# WHAT TO COMPLETE
#   Every `# TODO`. Then prove it: artificially age the orders source (e.g.
#   stop loading it, or set loaded_at back) and confirm `dbt source freshness`
#   reports ERROR and exits non-zero.
#
# DELIVERABLE
#   A `dbt source freshness` run showing PASS on fresh data and ERROR on aged
#   data, plus the non-zero exit code captured (echo $?).

